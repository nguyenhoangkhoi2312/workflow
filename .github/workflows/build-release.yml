name: Build App Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (optional, e.g., v1.0.0). If empty, auto-generates v1.0.X'
        required: false
        default: ''

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-14]
    runs-on: ${{ matrix.os }}
    
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Python Backend
        run: |
          cd backend
          pyinstaller workflow-backend.spec

      - name: Install Node dependencies
        run: npm install

      - name: Set App Version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="v1.0.${{ github.run_number }}"
          fi
          
          # Clean version for npm package.json (no 'v')
          CLEAN_VERSION="${VERSION#v}"
          node -e "let pkg = require('./package.json'); pkg.version = '$CLEAN_VERSION'; require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));"
          
          # Export tag version for release step
          echo "RELEASE_TAG=$VERSION" >> $GITHUB_ENV

      - name: Build Electron App
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_ID }}
          VITE_GOOGLE_DRIVE_API_KEY: ${{ secrets.VITE_GOOGLE_DRIVE_API_KEY }}

      - name: Upload Release Artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            release/*.exe
            release/*.dmg
          overwrite_files: true 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workflow</title>
  </head>
  <body>
    <div id="error-log" style="color: red; padding: 20px; font-family: monospace; z-index: 9999; position: absolute;"></div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        document.getElementById('error-log').innerHTML += '<p>' + message + ' at ' + source + ':' + lineno + '</p>';
      };
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
